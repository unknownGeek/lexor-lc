<div data-track-load="description_content">
  <p>Given an array of integers, return the sum of its elements.</p>
  <p>Constraints:</p>
  <ul>
    <li>The array length will be between 1 and 1000.</li>
    <li>Each element is between -1000 and 1000.</li>
  </ul>
  <div class="example-block">
    <p>Example:</p>
    <ul>
      <li>Input: [1,2,3]</li>
      <li>Output: 6</li>
    </ul>
  </div>
</div>
